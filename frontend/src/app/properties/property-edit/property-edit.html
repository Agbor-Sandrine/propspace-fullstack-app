<h2>Edit Property</h2>

<form (ngSubmit)="updateProperty()">

  <input
    type="text"
    placeholder="Title"
    [(ngModel)]="title"
    name="title"
  >

  <br><br>

  <textarea
    [(ngModel)]="description"
    name="description"
  ></textarea>

  <br><br>

  <input
    type="number"
    [(ngModel)]="price"
    name="price"
  >

  <br><br>

  <input
    type="text"
    [(ngModel)]="city"
    name="city"
  >

  <br><br>

  <input
    type="text"
    [(ngModel)]="country"
    name="country"
  >

  <br><br>

  <input
    type="text"
    [(ngModel)]="propertyType"
    name="propertyType"
  >

  <br><br>

  <button type="submit">
    Update Property
  </button>

</form>
