<div class="page">

  <h2>Available Properties</h2>

  <div class="property-grid">

    <div class="property-card" *ngFor="let property of properties">

      <h3>{{ property.title }}</h3>

      <p>{{ property.city }}</p>

      <p>{{ property.price }} FCFA</p>

      <p>{{ property.propertyType }}</p>

    </div>

  </div>

</div>
