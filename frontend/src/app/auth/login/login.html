<div class="auth-container">

  <div class="auth-card">

    <h2>Welcome Back</h2>

    <p class="subtitle">
      Login to your account
    </p>

    <form (ngSubmit)="login()">

      <input
        type="email"
        placeholder="Email Address"
        [(ngModel)]="user.email"
        name="email"
        required
      >

      <input
        type="password"
        placeholder="Password"
        [(ngModel)]="user.password"
        name="password"
        required
      >

      <button type="submit">
        Login
      </button>

    </form>

  </div>

</div>
